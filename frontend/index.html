<!DOCTYPE html>
<html>
<head>
  <title>Blood Donation Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center text-danger">Blood Donation Portal</h2>

  <div class="row mt-4">
    
    <!-- Register -->
    <div class="col-md-6">
      <h4>Register</h4>
      <input id="name" class="form-control mb-2" placeholder="Name">
      <input id="email" class="form-control mb-2" placeholder="Email">
      <input id="password" class="form-control mb-2" placeholder="Password">
      <button class="btn btn-success w-100" onclick="register()">Register</button>
    </div>

    <!-- Login -->
    <div class="col-md-6">
      <h4>Login</h4>
      <input id="lemail" class="form-control mb-2" placeholder="Email">
      <input id="lpassword" class="form-control mb-2" placeholder="Password">
      <button class="btn btn-primary w-100" onclick="login()">Login</button>
    </div>

  </div>
</div>

<script>
async function register() {
  await fetch("https://blood-backend-6.onrender.com", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      password: password.value
    })
  });
  alert("Registered Successfully ✅");
}

async function login() {
  const res = await fetch("https://blood-backend-6.onrender.com"
  , {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: lemail.value,
      password: lpassword.value
    })
  });

  const data = await res.json();
  localStorage.setItem("token", data.token);
  alert("Login Successful ✅");
  window.location.href = "request.html";
}
</script>

</body>
</html>
