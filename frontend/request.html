<script>
const API = "https://blood-backend-6.onrender.com";

async function sendRequest() {
  try {
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Please login first ❌");
      window.location.href = "index.html"; // 🔥 redirect to login
      return;
    }

    const bloodGroup = document.getElementById("blood").value.trim();
    const city = document.getElementById("city").value.trim();
    const hospital = document.getElementById("hospital").value.trim();

    if (!bloodGroup || !city || !hospital) {
      alert("All fields required ❌");
      return;
    }

    const res = await fetch(`${API}/api/donors`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ bloodGroup, city })
    });

    const data = await res.json();

    if (res.ok) {
      if (data.data.length === 0) {
        alert("No donors found ❌");
      } else {
        alert(`Found ${data.count} donors ✅`);

        // 🔥 Show donors in UI
        const list = document.getElementById("results");
        list.innerHTML = "";

        data.data.forEach(d => {
          const li = document.createElement("li");
          li.textContent = `${d.email} - ${d.bloodGroup} - ${d.city}`;
          list.appendChild(li);
        });
      }

    } else {
      alert(data.message || "Error ❌");
    }

  } catch (err) {
    console.log(err);
    alert("Server error ❌");
  }
}
</script>
