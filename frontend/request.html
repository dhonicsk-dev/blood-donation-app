<!DOCTYPE html>
<html>
<head>
  <title>Create Request</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center text-danger">Create Blood Request</h2>

  <div class="card p-4 mt-4">
    <input id="blood" class="form-control mb-2" placeholder="Blood Group">
    <input id="city" class="form-control mb-2" placeholder="City">
    <input id="hospital" class="form-control mb-2" placeholder="Hospital">
    
    <button class="btn btn-danger w-100" onclick="create()">Send Request</button>
  </div>
</div>

<script>
async function create() {
  const token = localStorage.getItem("token");

  await fetch("https://blood-backend-6.onrender.com", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      bloodGroup: blood.value,
      city: city.value,
      hospital: hospital.value
    })
  });

  alert("Request Sent ✅");
}
</script>

</body>
</html>
